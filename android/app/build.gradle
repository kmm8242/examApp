apply plugin: "com.android.application"

// Copy question JSON files into Android assets so the home screen widget can read them natively
task copyQuestionsToAssets(type: Copy) {
    from '../../src/data/questions'
    into 'src/main/assets/questions'
}
preBuild.dependsOn copyQuestionsToAssets
apply plugin: "org.jetbrains.kotlin.android"
apply plugin: "com.facebook.react"

react {
    autolinkLibrariesWithApp()
}

def enableProguardInReleaseBuilds = true

def jscFlavor = 'io.github.react-native-community:jsc-android:2026004.+'

android {
    ndkVersion rootProject.ext.ndkVersion
    buildToolsVersion rootProject.ext.buildToolsVersion
    compileSdk rootProject.ext.compileSdkVersion

    namespace "com.examapp"
    defaultConfig {
        // ⚠️ Change to your own reverse-domain ID before publishing.
        // This ID is permanent — the Play Store uses it to identify your app.
        applicationId "com.krishnamohanm.examapp"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0.0"
    }
    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
        release {
            // Credentials live in ~/.gradle/gradle.properties — never commit them here.
            // One-time setup: see "Release Keystore Setup" in CLAUDE.md.
            if (project.hasProperty('MYAPP_UPLOAD_STORE_FILE')) {
                storeFile file(MYAPP_UPLOAD_STORE_FILE)
                storePassword MYAPP_UPLOAD_STORE_PASSWORD
                keyAlias MYAPP_UPLOAD_KEY_ALIAS
                keyPassword MYAPP_UPLOAD_KEY_PASSWORD
            }
        }
    }
    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            // Uses release keystore when configured, falls back to debug until you run keystore setup.
            signingConfig project.hasProperty('MYAPP_UPLOAD_STORE_FILE')
                ? signingConfigs.release
                : signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android-optimize.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the React Native Gradle Plugin
    implementation("com.facebook.react:react-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }

    // Encrypts SharedPreferences (locked-app list, grace period) with AES-256 via Android Keystore
    implementation "androidx.security:security-crypto:1.1.0-alpha06"
}
